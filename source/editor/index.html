<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Markdown Benez</title>
    <link rel="icon" type="image/png" href="../icon.png">
    <link rel="stylesheet" href="lib/material-icons.css">
    <link rel="stylesheet" href="lib/base16-light.css">
    <link rel="stylesheet" href="codemirror/lib/codemirror.css">
    <link rel="stylesheet" href="lib/default.css">
    <link rel="stylesheet" href="lib/github-markdown.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body id="toplevel">
    <div id="in"><form><textarea id="code"># New Document</textarea></form></div>
    <div id="out" class="markdown-body"></div>
    <div id="modal-overlay" class="hidden"></div>
    <div id="menu">
      <span id="saveMenuTitle">Save As</span>
      <div id="saveas-markdown">
        <svg height="64" width="64" xmlns="http://www.w3.org/2000/svg">
          <g transform="scale(0.0625)">
            <path d="M950.154 192H73.846C33.127 192 0 225.12699999999995 0 265.846v492.308C0 798.875 33.127 832 73.846 832h876.308c40.721 0 73.846-33.125 73.846-73.846V265.846C1024 225.12699999999995 990.875 192 950.154 192zM576 703.875L448 704V512l-96 123.077L256 512v192H128V320h128l96 128 96-128 128-0.125V703.875zM767.091 735.875L608 512h96V320h128v192h96L767.091 735.875z" />
          </g>
        </svg>
        <span id="saveAsMarkdownLabel">Markdown</span>
      </div>
      <div id="saveas-html">
        <svg height="64" width="64" xmlns="http://www.w3.org/2000/svg">
          <g transform="scale(0.0625) translate(64,0)">
            <path d="M608 192l-96 96 224 224L512 736l96 96 288-320L608 192zM288 192L0 512l288 320 96-96L160 512l224-224L288 192z" />
          </g>
        </svg>
        <span id="saveAsHtmlLabel">HTML</span>
      </div>
      <a id="close-menu">&times;</a>
    </div>
    <div id="navbar">
      <div id="toolbar-shell">
        <div id="navcontent">
          <div class="tool-group">
            <button id="openbutton" type="button" title="Open from Disk" class="navbutton"><i class="material-icons">folder_open</i></button>
            <input id="fileInput" type="file" class="hidden" accept=".md,.mdown,.txt,.markdown"/>
            <button id="savebutton" type="button" title="Download" class="navbutton"><i class="material-icons">file_download</i></button>
            <button id="browsersavebutton" type="button" title="Browser Save" class="navbutton"><i class="material-icons">save</i></button>
            <button id="nightbutton" type="button" title="Night Mode" class="navbutton"><i class="material-icons">invert_colors</i></button>
            <button id="newbutton" type="button" title="Clear Document" class="navbutton"><i class="material-icons">delete_outline</i></button>
          </div>
          <div class="tool-divider"></div>
          <div class="tool-group">
            <button id="undoButton" type="button" title="Undo" class="navbutton"><i class="material-icons">undo</i></button>
            <button id="redoButton" type="button" title="Redo" class="navbutton"><i class="material-icons">redo</i></button>
          </div>
          <div class="tool-divider"></div>
          <div class="tool-group">
            <label for="headingSelect" class="toolbar-select-wrap">
              <select id="headingSelect" class="toolbar-select" title="Heading Level">
                <option id="headingOption0" value="0">Paragraph</option>
                <option id="headingOption1" value="1">Heading 1</option>
                <option id="headingOption2" value="2">Heading 2</option>
                <option id="headingOption3" value="3">Heading 3</option>
                <option id="headingOption4" value="4">Heading 4</option>
                <option id="headingOption5" value="5">Heading 5</option>
                <option id="headingOption6" value="6">Heading 6</option>
              </select>
            </label>
          </div>
          <div class="tool-divider"></div>
          <div class="tool-group">
            <button id="boldButton" type="button" title="Bold" class="navbutton navbutton-text"><strong>B</strong></button>
            <button id="italicButton" type="button" title="Italic" class="navbutton navbutton-text"><em>I</em></button>
            <button id="strikeButton" type="button" title="Strikethrough" class="navbutton navbutton-text">S</button>
            <button id="codeButton" type="button" title="Inline Code" class="navbutton navbutton-text">&lt;/&gt;</button>
          </div>
          <div class="tool-divider"></div>
          <div class="tool-group">
            <button id="quoteButton" type="button" title="Blockquote" class="navbutton"><i class="material-icons">format_quote</i></button>
            <button id="bulletListButton" type="button" title="Bullet List" class="navbutton"><i class="material-icons">format_list_bulleted</i></button>
            <button id="numberListButton" type="button" title="Numbered List" class="navbutton"><i class="material-icons">format_list_numbered</i></button>
            <button id="taskListButton" type="button" title="Task List" class="navbutton"><i class="material-icons">check_box</i></button>
          </div>
          <div class="tool-divider"></div>
          <div class="tool-group">
            <button id="linkButton" type="button" title="Insert Link" class="navbutton"><i class="material-icons">insert_link</i></button>
            <button id="imageButton" type="button" title="Insert Image" class="navbutton"><i class="material-icons">image</i></button>
            <button id="codeBlockButton" type="button" title="Code Block" class="navbutton"><i class="material-icons">code</i></button>
            <button id="tableButton" type="button" title="Table" class="navbutton"><i class="material-icons">table_chart</i></button>
            <button id="hrButton" type="button" title="Horizontal Rule" class="navbutton"><i class="material-icons">horizontal_rule</i></button>
          </div>
        </div>
      </div>
    </div>
    <script src="lib/markdown-it.js"></script>
    <script src="lib/markdown-it-footnote.js"></script>
    <script src="lib/highlight.pack.js"></script>
    <script src="codemirror/lib/codemirror.js"></script>
    <script src="codemirror/overlay.js"></script>
    <script src="codemirror/xml/xml.js"></script>
    <script src="codemirror/markdown/markdown.js"></script>
    <script src="codemirror/gfm/gfm.js"></script>
    <script src="codemirror/lib/util/continuelist.js"></script>
    <script src="lib/rawinflate.js"></script>
    <script src="lib/rawdeflate.js"></script>
    <script src="app.js"></script>
  </body>
</html>
